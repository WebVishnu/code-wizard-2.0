# ── ROOT ────────────────────────────────────────────────────────────────────
root: "."

# ── DATA ────────────────────────────────────────────────────────────────────
data:
  train_images: "training/train/Color_Images"
  train_masks:  "training/train/Segmentation"
  val_images:   "training/val/Color_Images"
  val_masks:    "training/val/Segmentation"
  test_images:  "testing/Color_Images"

  raw_ids: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]

  # FIX 1: Proper semantic names → helps debug which classes are failing
  class_names:
    - "Trees"           # id 100
    - "Lush_Bushes"     # id 200
    - "Dry_Grass"       # id 300
    - "Dry_Bushes"      # id 500
    - "Ground_Clutter"  # id 550
    - "Flowers"         # id 600
    - "Logs"            # id 700
    - "Rocks"           # id 800
    - "Landscape"       # id 7100
    - "Sky"             # id 10000

  # FIX 2: 640 gives model more spatial context per crop vs 512
  crop_size: 640

  # FIX 3: Increased from 0.35 → more training time on rare classes
  # (Logs, Flowers, Rocks are likely underrepresented)
  rare_class_crop_prob: 0.5

  # Keep weighted sampler ON — oversamples images with rare classes
  weighted_sampler: true
  weighted_sampler_eps: 1.0e-6

  # FIX 4: Increase workers for faster data loading (adjust if OOM)
  num_workers: 4

  ignore_index: 255

# ── MODEL ────────────────────────────────────────────────────────────────────
model:
  # FIX 5: CRITICAL — your old config had segformer_b2 + resnet101 which CONFLICT.
  # segformer_b2 uses its own MiT backbone, not resnet.
  # Sticking with DeepLabV3+ + ResNet101 = most stable, proven pipeline
  # with your existing factory.py code. No extra code changes needed.
  architecture: "deeplabv3plus"
  encoder_name: "resnet101"        # Upgrade from resnet50 → +3-5% mIoU
  encoder_weights: "imagenet"      # Always use pretrained weights

# ── TRAINING ─────────────────────────────────────────────────────────────────
train:
  batch_size: 4             # Increase if VRAM allows (8GB GPU → use 4, 6GB → use 2)
  val_batch_size: 4

  epochs: 100               # Early stopping will kick in before this
  early_stop_patience: 20   # Stop if no improvement for 20 epochs

  # FIX 6: Higher LR works better for DeepLabV3+ vs SegFormer finetuning
  lr: 0.0001
  weight_decay: 0.01

  # FIX 7: Remove backbone_lr_mult — that was for SegFormer only
  # DeepLabV3+ trains all layers at the same LR via AdamW

  warmup_ratio: 0.10        # 10% of steps = linear warmup (slightly longer than default)
  amp: true                 # Keep ON — speeds up training on CUDA
  gradient_clip: 1.0
  seed: 42

  checkpoint_dir: "checkpoints"
  log_interval: 20

  # FIX 8: CRITICAL — was "global_pixel_accuracy" which does NOT optimize IoU.
  # The hackathon scores on IoU → checkpoint on mIoU to save the best IoU model.
  checkpoint_metric: "miou"

# ── LOSS ─────────────────────────────────────────────────────────────────────
loss:
  # focal_ce_dice = best combo for:
  # - class imbalance (focal handles easy/hard pixel weighting)
  # - boundary sharpness (dice encourages clean region boundaries)
  # - fixes your fragmented mask output
  name: "focal_ce_dice"

  dice_weight: 0.5          # Equal weight between focal CE and Dice
  focal_gamma: 2.0          # Standard focal loss — penalizes easy pixels less
  label_smoothing: 0.1      # Prevents overconfident predictions
  class_weight_cap: 10      # Lowered from 15 → prevents rare class loss explosion

# ── AUGMENTATION ─────────────────────────────────────────────────────────────
augmentation:
  # Strong = true enables sun flare + shadow blocks
  # Critical for desert domain — lighting varies wildly
  strong: true

# ── EMA ──────────────────────────────────────────────────────────────────────
ema:
  enabled: true
  # FIX 9: Slightly higher decay = smoother weight averaging = better val mIoU
  decay: 0.9995             # Up from 0.999

# ── INFERENCE ────────────────────────────────────────────────────────────────
inference:
  tile_size: 512
  # FIX 10: Reduce overlap during development for speed (0.25 → 0.1)
  # Switch back to 0.25 only for FINAL submission inference
  overlap: 0.1

  # FIX 11: Disable TTA during training/dev cycles — costs 2x time with marginal gain.
  # Re-enable ONLY for final test submission run.
  tta_flip: false

  batch_size: 1