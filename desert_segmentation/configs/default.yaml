# Paths are relative to `root` unless absolute.
root: "."

data:
  train_images: "training/train/Color_Images"
  train_masks: "training/train/Segmentation"
  val_images: "training/val/Color_Images"
  val_masks: "training/val/Segmentation"
  test_images: "testing/Color_Images"

  # Raw uint16 label IDs (must match PNG values) and display names
  raw_ids: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  class_names:
    - "id_100"
    - "id_200"
    - "id_300"
    - "id_500"
    - "id_550"
    - "id_600"
    - "id_700"
    - "id_800"
    - "id_7100"
    - "id_10000"

  crop_size: 512
  num_workers: 4
  # Prefer crops containing underrepresented classes (probability 0–1). Higher = more
  # training crops centered on rare-class pixels (see SegmentationDataset).
  rare_class_crop_prob: 0.5
  # Oversample images that contain rare classes (scans train masks at startup).
  weighted_sampler: true
  weighted_sampler_eps: 1.0e-6
  ignore_index: 255

# segformer_b2: good speed/VRAM. For max quality on large GPUs use segformer_b5 + batch_size 1.
model:
  architecture: "segformer_b2"
  pretrained_id: "nvidia/segformer-b2-finetuned-ade-512-512"
  encoder_name: "resnet50"
  encoder_weights: "imagenet"

train:
  batch_size: 2
  val_batch_size: 2
  epochs: 100
  # Lower LR for stable ADE20K→custom finetuning; backbone gets backbone_lr_mult × lr.
  lr: 0.00006
  backbone_lr_mult: 0.1
  weight_decay: 0.01
  warmup_ratio: 0.1
  amp: true
  gradient_clip: 1.0
  seed: 42
  checkpoint_dir: "checkpoints"
  log_interval: 20
  early_stop_patience: 30
  # Save best.pt by validation global pixel accuracy (fraction correct among labeled pixels).
  # Alternatives: miou | mean_class_accuracy
  checkpoint_metric: "global_pixel_accuracy"

loss:
  name: "focal_ce_dice"
  dice_weight: 0.45
  label_smoothing: 0.05
  class_weight_cap: 15.0
  focal_gamma: 2.0

augmentation:
  strong: true

ema:
  enabled: true
  decay: 0.999

inference:
  tile_size: 512
  overlap: 0.25
  tta_flip: true
  batch_size: 1
